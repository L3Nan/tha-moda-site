backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "conteudo"
    label: "Conteúdo do Site"
    files:
      - name: "products"
        label: "Produtos"
        file: "data/products.json"
        format: "json"
        fields:
          - name: "products"
            label: "Lista de produtos"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { name: "id", label: "ID", widget: "string" }
              - { name: "slug", label: "Slug (url)", widget: "string" }
              - { name: "name", label: "Nome", widget: "string" }
              - { name: "category", label: "Categoria", widget: "relation", collection: "conteudo", file: "categories", search_fields: ["categories.*.name"], value_field: "categories.*.slug", display_fields: ["categories.*.name"] }
              - { name: "price", label: "Preço", widget: "number", value_type: "float" }
              - { name: "salePrice", label: "Preço promocional", widget: "number", value_type: "float", required: false }
              - { name: "images", label: "Imagens", widget: "list", field: { label: "Imagem", name: "image", widget: "image" } }
              - { name: "sizes", label: "Tamanhos", widget: "list", required: false }
              - { name: "colors", label: "Cores", widget: "list", required: false }
              - { name: "description", label: "Descrição", widget: "text" }
              - { name: "details", label: "Detalhes", widget: "text", required: false }
              - { name: "tags", label: "Tags", widget: "select", multiple: true, options: ["novidades", "mais_vendidos", "promocoes"], required: false }
              - { name: "inStock", label: "Em estoque", widget: "boolean", default: true }

      - name: "categories"
        label: "Categorias"
        file: "data/categories.json"
        format: "json"
        fields:
          - name: "categories"
            label: "Lista de categorias"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { name: "id", label: "ID", widget: "string" }
              - { name: "name", label: "Nome", widget: "string" }
              - { name: "slug", label: "Slug (url)", widget: "string" }
