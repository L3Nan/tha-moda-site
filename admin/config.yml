backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "products"
    label: "Produtos"
    folder: "data"
    create: true
    fields:
      - { label: "Nome", name: "name", widget: "string" }
      - { label: "Preço", name: "price", widget: "number" }
      - { label: "Descrição", name: "description", widget: "text" }
      - { label: "Imagem", name: "image", widget: "image" }
      