<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Produto — Tha Modas e Acessórios</title>
  <link rel="stylesheet" href="./css/style.css">
  <script type="module" src="./js/app.js"></script>
</head>
<body data-page="produto">

<header>
  <div class="header-inner">
    <a class="brand" href="./index.html"><span class="dot"></span><span>Tha Modas e Acessórios</span></a>
    <nav class="nav">
      <a href="./loja.html">Loja</a>
      <a href="./sobre.html">Sobre</a>
      <a href="./contato.html">Contato</a>
    </nav>
    <div class="actions">
      <button class="pill" id="searchToggle" type="button" aria-label="Buscar">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 0 0114 0z"></path>

    <input type="text" id="searchInput" placeholder="Buscar produtos..." autocomplete="off">
    <button class="search-close" id="searchClose" aria-label="Fechar">×</button>
  </div>
</div>

<main class="container">
  <div id="productWrap"></div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-col"><a href="./loja.html">Voltar para loja</a></div>
