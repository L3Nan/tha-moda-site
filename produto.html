<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Produto — Tha Modas e Acessórios</title>
  <link rel="stylesheet" href="./css/style.css">
  <script type="module" src="./js/app.js"></script>
</head>
<body data-page="produto">

<div class="topbar">
  <div class="topbar-inner">
    <div>Frete grátis em pedidos acima de R$250</div>
    <div class="topbar-right">📞 (11) 91234-5678</div>
  </div>
</div>
<header class="hero-header">
  <div class="header-inner header-hero">
    <nav class="nav nav-left">
      <a href="./index.html">Inicio</a>
      <a href="./loja.html">Loja</a>
      <a href="./contato.html">Contato</a>
    </nav>
    <a class="brand hero-brand" href="./index.html">
      <img class="hero-logo" src="./uploads/logo-redonda.png" alt="Tha Modas e Acessórios">
    </a>
    <div class="actions hero-actions">
      <button class="pill" id="searchToggle" type="button" aria-label="Buscar">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </button>
      <a class="pill" href="./carrinho.html">
        Cart
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 7h12l-1.5 12h-9L6 7z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7a3 3 0 016 0"></path>
        </svg>
        <span class="badge" id="cartCount">0</span>
      </a>
    </div>
  </div>
</header>

<div class="search-overlay" id="searchOverlay">
  <div class="search-modal">
    <input type="text" id="searchInput" placeholder="Buscar produtos..." autocomplete="off">
    <button class="search-close" id="searchClose" aria-label="Fechar">×</button>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<main class="page">
  <div class="container">
    <div id="productWrap"></div>
  </div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-col"><a href="./loja.html">Voltar para loja</a></div>
  </div>
</footer>

</body>
</html>
