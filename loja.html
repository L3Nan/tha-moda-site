<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loja — Tha Moda</title>
  <link rel="stylesheet" href="./css/style.css">
  <script type="module" src="./js/app.js"></script>
</head>
<body data-page="loja">

<header>
  <div class="header-inner">
    <a class="brand" href="./index.html"><span class="dot"></span><span>Tha Moda & Acessórios</span></a>
    <nav class="nav">
      <a href="./loja.html">Loja</a>
      <a href="./sobre.html">Sobre</a>
      <a href="./contato.html">Contato</a>
    </nav>
    <div class="actions">
      <a class="pill" href="./carrinho.html">Carrinho <span class="badge" id="cartCount">0</span></a>
    </div>
  </div>
</header>

<main class="container">
  <section class="section">
    <h2 class="section-title">Vitrine</h2>
    <div class="grid" id="gridVitrine"></div>
  </section>

  <section class="section">
    <h1 class="section-title">Loja</h1>
    <p class="muted">Filtre por categoria, tamanho e cor.</p>

    <div id="categoryBar" class="category-bar" aria-label="Categorias"></div>

    <div class="card" style="margin-top:14px">
      <div class="card-body">
        <div class="form-row">
          <div class="field">
            <label>Categoria</label>
            <select id="filterCategory"></select>
          </div>
          <div class="field">
            <label>Tamanho</label>
            <select id="filterSize"></select>
          </div>
          <div class="field">
            <label>Cor</label>
            <select id="filterColor"></select>
          </div>
          <div class="field">
            <label>Ordenar</label>
            <select id="filterSort">
              <option value="">Padrão</option>
              <option value="price-asc">Menor preço</option>
              <option value="price-desc">Maior preço</option>
              <option value="sale">Promoções primeiro</option>
            </select>
          </div>
          <div class="field">
            <label>Buscar</label>
            <input id="filterSearch" placeholder="Ex: vestido, blusa...">
          </div>
          <div class="field" style="display:flex;align-items:flex-end;gap:10px">
            <label style="display:flex;gap:10px;align-items:center;font-weight:900">
              <input id="filterSale" type="checkbox" style="width:auto"> Somente promoções
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="grid" id="gridLoja"></div>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-col"><strong style="color:var(--brand)">Tha Moda & Acessórios</strong></div>
    <div class="footer-col"><a href="./politica-de-privacidade.html">Privacidade</a></div>
    <div class="footer-col"><a href="./contato.html">Contato</a></div>
  </div>
</footer>

</body>
</html>
